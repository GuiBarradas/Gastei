# Regras determinísticas — estágio 1 do pipeline (§7.2 do ARCHITECTURE.md).
# Devem cobrir ≥60% das transações típicas (princípio §2.3).
#
# Convenções:
# - pattern_type "substring" é case-insensitive — preferir sempre que possível
# - pattern_type "regex" só quando substring não basta (precisa de \b, alternância, etc.)
# - priority: maior vence. Default 100. Use 200+ pra "fortes", 50- pra "ambíguas".
# - As descrições reais de extratos brasileiros costumam vir em CAIXA ALTA com sufixos
#   ("IFOOD *RESTAURANTE", "UBER *TRIP HELP.UBER.COM"). Os patterns aqui são lowercase
#   (o engine compara em lowercase).

