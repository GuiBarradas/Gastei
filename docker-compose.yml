services:
  api:
    build: .
    container_name: gastei-api
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  streamlit:
    build: .
    container_name: gastei-streamlit
    env_file:
      - path: .env
        required: false
    environment:
      # Streamlit reaches the API through the service name on the compose network
      GASTEI_API_URL: http://api:8000
    command:
      - "uv"
      - "run"
      - "streamlit"
      - "run"
      - "streamlit_app/app.py"
      - "--server.port=8501"
      - "--server.address=0.0.0.0"
      - "--server.headless=true"
      - "--browser.gatherUsageStats=false"
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
